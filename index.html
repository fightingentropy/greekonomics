<!DOCTYPE html>
<html lang="en" class="dark-mode">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greekonomics - Financial Education Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="bi bi-graph-up-arrow"></i> Greekonomics</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/">Blog</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about.html">About</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="search-section">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Search articles...">
                <i class="bi bi-search search-icon"></i>
            </div>
            <div class="popular-tags" id="tagContainer">
                <span class="tag active" data-tag="all">All</span>
                <span class="tag" data-tag="investing">#investing</span>
                <span class="tag" data-tag="budgeting">#budgeting</span>
                <span class="tag" data-tag="crypto">#crypto</span>
                <span class="tag" data-tag="stocks">#stocks</span>
                <span class="tag" data-tag="personal-finance">#personal-finance</span>
            </div>
        </div>

        <div class="blog-grid" id="blogGrid">
            <!-- Blog posts will be dynamically inserted here -->
        </div>
    </main>

    <footer>
        <div class="container text-center py-4">
            <p>&copy; 2025 Greekonomics. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts.js"></script>
</body>

</html>
