<!DOCTYPE html>
<html lang="en" class="dark-mode">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/assets/favicon/favicon.svg">
    <link rel="alternate icon" type="image/png" href="/assets/favicon/favicon.png">
    <title>Article - Greekonomics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/article.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-graph-up-arrow"></i> Greekonomics</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Blog</a></li>
                    <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container article-container">
        <article class="article-content">
            <div class="article-header">
                <div class="article-meta">
                    <div class="article-tags" id="articleTags">
                        <!-- Tags will be inserted here -->
                    </div>
                    <div class="article-info">
                        <span id="articleDate"></span>
                        <span id="articleReadTime"></span>
                    </div>
                </div>
                <h1 id="articleTitle" class="article-title"></h1>
            </div>
            
            <img id="articleImage" class="article-image" src="" alt="">
            
            <div id="articleBody" class="article-body">
                <!-- Article content will be inserted here -->
            </div>

            <div class="article-footer">
                <div class="article-share">
                    <h3>Share this article</h3>
                    <div class="share-buttons">
                        <button class="btn btn-outline-light"><i class="bi bi-twitter"></i></button>
                        <button class="btn btn-outline-light"><i class="bi bi-linkedin"></i></button>
                        <button class="btn btn-outline-light"><i class="bi bi-facebook"></i></button>
                        <button class="btn btn-outline-light"><i class="bi bi-link-45deg"></i></button>
                    </div>
                </div>
                
                <div class="related-articles" id="relatedArticles">
                    <h3>Related Articles</h3>
                    <div class="related-grid">
                        <!-- Related articles will be inserted here -->
                    </div>
                </div>
            </div>
        </article>
    </main>

    <footer>
        <div class="container text-center py-4">
            <p>&copy; 2025 Greekonomics. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/article.js"></script>
</body>
</html>
